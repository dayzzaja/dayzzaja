<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="680" height="390">
  <defs>
    <clipPath id="avatarClip">
      <rect x="434" y="24" width="220" height="220" rx="14" ry="14"/>
    </clipPath>
    <clipPath id="profileClip">
      <circle cx="44" cy="34" r="20"/>
    </clipPath>
    <clipPath id="marqueeClip">
      <rect x="434" y="310" width="234" height="22"/>
    </clipPath>
    <linearGradient id="igGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f09433"/>
      <stop offset="25%"  stop-color="#e6683c"/>
      <stop offset="50%"  stop-color="#dc2743"/>
      <stop offset="75%"  stop-color="#cc2366"/>
      <stop offset="100%" stop-color="#bc1888"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.35"/>
    </filter>
    <filter id="profileGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.6"/>
    </filter>
    <style>
      @keyframes fall {
        0%   { transform:translateY(0) rotate(0deg); opacity:1; }
        100% { transform:translateY(370px) rotate(540deg); opacity:0; }
      }
      @keyframes bdaypulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
      @keyframes marquee {
        0%   { transform: translateX(668px); }
        100% { transform: translateX(-320px); }
      }
      .c1{animation:fall 3.0s 0.0s linear infinite;}
      .c2{animation:fall 2.7s 0.5s linear infinite;}
      .c3{animation:fall 3.4s 1.0s linear infinite;}
      .c4{animation:fall 2.5s 0.3s linear infinite;}
      .c5{animation:fall 3.1s 0.8s linear infinite;}
      .c6{animation:fall 2.8s 1.3s linear infinite;}
      .bdaypulse{animation:bdaypulse 1.4s ease-in-out infinite;}
      .confetti{display:none;} .confetti.show{display:block;}
      .marquee-text{animation:marquee 18s linear infinite;}
    </style>
  </defs>

  <!-- Card -->
  <rect width="680" height="390" rx="16" fill="#161b22"/>
  <rect width="680" height="390" rx="16" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <rect x="0" y="0" width="5" height="390" rx="3" fill="#7c3aed"/>

  <!-- Confetti -->
  <g id="confetti_group" class="confetti">
    <rect class="c1" x="40"  y="0" width="8" height="8"  rx="2" fill="#f472b6"/>
    <rect class="c2" x="100" y="0" width="7" height="10" rx="1" fill="#818cf8"/>
    <rect class="c3" x="170" y="0" width="9" height="7"  rx="2" fill="#34d399"/>
    <rect class="c4" x="240" y="0" width="8" height="8"  rx="1" fill="#fbbf24"/>
    <rect class="c5" x="310" y="0" width="7" height="9"  rx="2" fill="#f472b6"/>
    <rect class="c6" x="380" y="0" width="9" height="7"  rx="1" fill="#60a5fa"/>
  </g>

  <!-- ── DAILY AVATAR (right) ── -->
  <rect x="432" y="22" width="224" height="224" rx="16"
        fill="#7c3aed" opacity="0.15" filter="url(#shadow)"/>
  <rect x="432" y="22" width="224" height="224" rx="16"
        fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <image id="daily_avatar"
         href="data:image/jpeg;base64,AVATAR_PLACEHOLDER"
         x="434" y="24" width="220" height="220"
         clip-path="url(#avatarClip)"
         preserveAspectRatio="xMidYMid slice"/>

  <!-- ── PROFILE AVATAR (circle, top-left) ── -->
  <circle cx="44" cy="34" r="22" fill="#7c3aed" opacity="0.3" filter="url(#profileGlow)"/>
  <circle cx="44" cy="34" r="21.5" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.8"/>
  <image id="profile_avatar"
         href="data:image/jpeg;base64,PROFILE_PLACEHOLDER"
         x="24" y="14" width="40" height="40"
         clip-path="url(#profileClip)"
         preserveAspectRatio="xMidYMid slice"/>

  <!-- ── HEADER ── -->
  <text x="74" y="43" font-family="Georgia,serif" font-size="24" font-weight="700" font-style="italic" fill="#e6edf3">Dayzzaja</text>
  <text x="74" y="62" font-family="'Fira Code',monospace" font-size="10.5" fill="#8b949e">@dayzzaja · when yeah :D · slow to respond 🐢</text>
  <text id="birthday_msg" x="24" y="88" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#f472b6" class="bdaypulse"></text>
  <line x1="24" y1="98" x2="415" y2="98" stroke="#21262d" stroke-width="1"/>

  <!-- ABOUT -->
  <text x="24" y="116" font-family="'Fira Code',monospace" font-size="9" font-weight="600" letter-spacing="1.5" fill="#484f58">── ABOUT ──────────────────────────────</text>
  <text x="24"  y="136" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Age</text>
  <text x="405" y="136" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="age_data" text-anchor="end">-</text>
  <line x1="24" y1="148" x2="415" y2="148" stroke="#21262d" stroke-width="1"/>

  <!-- GITHUB -->
  <text x="24" y="165" font-family="'Fira Code',monospace" font-size="9" font-weight="600" letter-spacing="1.5" fill="#484f58">── GITHUB ─────────────────────────────</text>
  <text x="24"  y="186" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Commits</text>
  <text x="405" y="186" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="commit_data" text-anchor="end">0</text>
  <text x="24"  y="207" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Stars Earned</text>
  <text x="405" y="207" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="star_data" text-anchor="end">0</text>
  <text x="24"  y="228" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Repositories</text>
  <text x="405" y="228" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="repo_data" text-anchor="end">0</text>
  <text x="24"  y="249" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Contributed To</text>
  <text x="405" y="249" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="contrib_data" text-anchor="end">0</text>
  <text x="24"  y="270" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Followers</text>
  <text x="405" y="270" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="follower_data" text-anchor="end">1</text>
  <line x1="24" y1="282" x2="415" y2="282" stroke="#21262d" stroke-width="1"/>

  <!-- LOC -->
  <text x="24" y="298" font-family="'Fira Code',monospace" font-size="9" font-weight="600" letter-spacing="1.5" fill="#484f58">── LINES OF CODE ON GITHUB ────────────</text>
  <text x="24"  y="318" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Added</text>
  <text x="100" y="318" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="loc_add">0</text>
  <text x="170" y="318" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Deleted</text>
  <text x="256" y="318" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="loc_del">0</text>
  <text x="326" y="318" font-family="'Fira Code',monospace" font-size="13" fill="#c9d1d9">Net</text>
  <text x="366" y="318" font-family="'Fira Code',monospace" font-size="13" font-weight="700" fill="#a78bfa" id="loc_data">0</text>

  <!-- ── CONTACT ── -->
  <text x="434" y="272" font-family="'Fira Code',monospace" font-size="9" font-weight="600" letter-spacing="1.5" fill="#484f58">── CONTACT ──────</text>

  <!-- TikTok (left) -->
  <g transform="translate(434, 278)">
    <rect width="20" height="20" rx="5" fill="#010101"/>
    <g transform="translate(3,2) scale(0.58)">
      <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.95a8.16 8.16 0 004.77 1.52V7.01a4.85 4.85 0 01-1-.32z" fill="white"/>
    </g>
  </g>
  <text x="460" y="293" font-family="'Fira Code',monospace" font-size="11" fill="#58a6ff">@_dzzwkwk</text>

  <!-- Instagram (right) -->
  <g transform="translate(551, 278)">
    <rect width="20" height="20" rx="6" fill="url(#igGrad)"/>
    <g transform="translate(3.5,3.5) scale(0.65)">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" fill="white"/>
    </g>
  </g>
  <text x="577" y="293" font-family="'Fira Code',monospace" font-size="11" fill="#58a6ff">@dzz_hehehe</text>

  <!-- Running text -->
  <line x1="434" y1="308" x2="668" y2="308" stroke="#21262d" stroke-width="1"/>
  <g clip-path="url(#marqueeClip)">
    <text class="marquee-text" x="0" y="326"
          font-family="'Segoe UI',sans-serif" font-size="11"
          fill="#a78bfa" opacity="0.9">👋 Halo semuanya! Selamat datang.</text>
  </g>

</svg>
